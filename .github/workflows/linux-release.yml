name: Linux release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional branch, tag, or SHA to build"
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Linux release binaries
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      GIT_LFS_SKIP_SMUDGE: "1"
      NIM_VERSION: "2.2.6"
      CXX: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
          submodules: false
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            curl \
            git-lfs \
            lld \
            make \
            xz-utils

      - name: Build release binaries
        id: build
        run: |
          set -euo pipefail

          nim_root="$RUNNER_TEMP/nim"
          mkdir -p "$nim_root"

          curl -fsSL \
            -o "$RUNNER_TEMP/nim-${NIM_VERSION}-linux_x64.tar.xz" \
            "https://nim-lang.org/download/nim-${NIM_VERSION}-linux_x64.tar.xz"
          tar -xJf "$RUNNER_TEMP/nim-${NIM_VERSION}-linux_x64.tar.xz" -C "$nim_root"
          export PATH="$nim_root/nim-${NIM_VERSION}/bin:$PATH"

          nim --version
          nimble --version
          clang --version
          ld.lld --version
          git lfs install --local

          version="$(
            awk '
              /^MAJOR_VERSION :=/ { major = $3 }
              /^MINOR_VERSION :=/ { minor = $3 }
              /^PATCH_VERSION :=/ { patch = $3 }
              END { print major "." minor "." patch }
            ' Makefile
          )"
          release_base="heimdall-${version}-linux-amd64"

          make deps net
          make legacy SKIP_DEPS=1 IS_RELEASE=1 EXE_BASE="bin/${release_base}-core2"
          make modern SKIP_DEPS=1 IS_RELEASE=1 EXE_BASE="bin/${release_base}-haswell"
          make zen2 SKIP_DEPS=1 IS_RELEASE=1 EXE_BASE="bin/${release_base}-zen2"
          make avx512 SKIP_DEPS=1 IS_RELEASE=1 EXE_BASE="bin/${release_base}-avx512"

          mkdir -p artifacts
          cp "bin/${release_base}"-* artifacts/
          (
            cd artifacts
            sha256sum "${release_base}"-* > SHA256SUMS.txt
            tar -czf "${release_base}.tar.gz" "${release_base}"-* SHA256SUMS.txt
          )

          echo "artifact_name=${release_base}" >> "$GITHUB_OUTPUT"

      - name: Upload release binaries
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
